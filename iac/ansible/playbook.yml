---
- name: Install Docker on Ubuntu hosts
  hosts: docker_hosts
  become: yes
  gather_facts: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Verify Docker installation
      command: docker --version
      register: docker_version

    - name: Display Docker version
      debug:
        msg: "{{ docker_version.stdout }}"

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Reset connection to apply group changes
      meta: reset_connection

    - name: Create dvwa directory
      file:
        path: ~/dvwa
        state: directory
        mode: '0755'

    - name: Copy docker-compose.yml to dvwa directory
      copy:
        src: ./dvwa/docker-compose.yml
        dest: ~/dvwa/docker-compose.yml
        mode: '0644'

    - name: pull des images docker necessaire
      command: docker compose pull
      args:
        chdir: ~/dvwa

    - name: Run docker compose up
      command: docker compose up -d
      args:
        chdir: ~/dvwa
